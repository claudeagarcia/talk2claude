const SAL_LABELS = {4:"MUST VISIT",3:"DON'T MISS",2:"WORTH A DETOUR",1:"MINOR LANDMARK"};
let activePaths = new Set(), langFilter = "all", selected = null, hovered = null;
let pan = {x:0,y:0}, zoom = 1, panning = false, lastM = {x:0,y:0};
const nodeMap = {}; L.forEach(n => nodeMap[n.id] = n);
const NS = "http://www.w3.org/2000/svg";

function getSal(n) {
  return langFilter === "fr" && n.lang === "fr" ? Math.min(4, n.sal + 1) : n.sal;
}
function dist(a,b) { return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2); }

function buildEdges() {
  const edges = [];
  Object.keys(PATHS).forEach(pid => {
    const on = L.filter(n => n.paths.includes(pid));
    const spine = on.filter(n => getSal(n) >= 3).sort((a,b) => (a.x+a.y*0.6)-(b.x+b.y*0.6));
    for (let i=0;i<spine.length-1;i++) edges.push({from:spine[i].id,to:spine[i+1].id,path:pid,t:"spine"});
    const branches = on.filter(n => getSal(n) === 2);
    branches.forEach(b => {
      let near=null,md=Infinity;
      spine.forEach(s => { const d=dist(b,s); if(d<md){md=d;near=s;} });
      if(near) edges.push({from:b.id,to:near.id,path:pid,t:"branch"});
    });
    const leaves = on.filter(n => getSal(n) === 1);
    const targets = on.filter(n => getSal(n) >= 2);
    leaves.forEach(l => {
      let near=null,md=Infinity;
      targets.forEach(t => { const d=dist(l,t); if(d<md){md=d;near=t;} });
      if(near) edges.push({from:l.id,to:near.id,path:pid,t:"leaf"});
    });
  });
  return edges;
}

function getDisplayColor(node) {
  const active = activePaths.size > 0 ? node.paths.filter(p=>activePaths.has(p)) : node.paths;
  return active.length >= 1 ? PATHS[active[0]].color : (node.paths.length===1 ? PATHS[node.paths[0]].color : "#ccc");
}

function isVisible(n) {
  const pOk = activePaths.size===0 || n.paths.some(p=>activePaths.has(p));
  const lOk = langFilter==="all" || n.lang===langFilter;
  return pOk && lOk;
}
function isEdgeVis(e) {
  if(activePaths.size>0 && !activePaths.has(e.path)) return false;
  if(langFilter!=="all") {
    const f=nodeMap[e.from],t=nodeMap[e.to];
    if(f&&t&&f.lang!==langFilter&&t.lang!==langFilter) return false;
  }
  return true;
}

function edgePath(e) {
  const a=nodeMap[e.from],b=nodeMap[e.to]; if(!a||!b)return"";
  const edges=buildEdges();
  const same=edges.filter(x=>(x.from===e.from&&x.to===e.to)||(x.from===e.to&&x.to===e.from));
  const idx=same.findIndex(x=>x.from===e.from&&x.to===e.to&&x.path===e.path);
  const off=(idx-(same.length-1)/2)*12;
  const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy)||1;
  return`M${a.x},${a.y} Q${mx+(-dy/len)*off},${my+(dx/len)*off} ${b.x},${b.y}`;
}

function nodeSize(n) { const s=getSal(n); return s===4?22:s===3?16:s===2?11:8; }

function render() {
  const svg = document.getElementById('map');
  const edges = buildEdges();

  // Build SVG content
  let html = `<defs>
    <filter id="gl"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="dots" width="25" height="25" patternUnits="userSpaceOnUse"><circle cx="12.5" cy="12.5" r="0.4" fill="#0f0f14"/></pattern>
  </defs>
  <g id="world" transform="translate(${pan.x},${pan.y}) scale(${zoom})">
    <rect x="-100" y="-50" width="1200" height="750" fill="url(#dots)"/>`;

  // Districts
  DISTRICTS.forEach(d => {
    html += `<text x="${d.x}" y="${d.y}" text-anchor="middle" fill="${d.color}" font-size="11" opacity="0.12" font-family="'Courier New',monospace" font-weight="bold" letter-spacing="4">${d.name}</text>`;
    html += `<text x="${d.x}" y="${d.y+14}" text-anchor="middle" fill="${d.color}" font-size="7" opacity="0.08" font-family="'Courier New',monospace" letter-spacing="1">${d.desc}</text>`;
  });

  // Axes
  html += `<line x1="490" y1="0" x2="490" y2="650" stroke="#0e0e12" stroke-width="0.5"/>`;
  html += `<line x1="0" y1="320" x2="980" y2="320" stroke="#0e0e12" stroke-width="0.5"/>`;
  html += `<text x="490" y="640" text-anchor="middle" fill="#181818" font-size="8" letter-spacing="3" font-family="'Courier New',monospace">← GLOBAL · STRATEGIC                    EMPIRICAL · LOCAL →</text>`;

  // Edges
  edges.forEach((e,i) => {
    const a=nodeMap[e.from],b=nodeMap[e.to]; if(!a||!b)return;
    const vis=isEdgeVis(e);
    const hot=selected&&(e.from===selected||e.to===selected);
    const pathActive=activePaths.size>0&&activePaths.has(e.path);
    const isSpine=e.t==="spine",isBranch=e.t==="branch";
    const same=edges.filter(x=>(x.from===e.from&&x.to===e.to)||(x.from===e.to&&x.to===e.from));
    const idx=same.indexOf(e);
    const off=(idx-(same.length-1)/2)*12;
    const mx=(a.x+b.x)/2,my=(a.y+b.y)/2,dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy)||1;
    const path=`M${a.x},${a.y} Q${mx+(-dy/len)*off},${my+(dx/len)*off} ${b.x},${b.y}`;
    const sw=hot?3:isSpine?(pathActive?2:1.3):(pathActive?1:0.6);
    const op=vis?(hot?0.85:pathActive?(isSpine?0.45:0.25):(isSpine?0.15:0.06)):0.02;
    const dash=isSpine?"none":isBranch?"6 3":"3 3";
    html+=`<path d="${path}" fill="none" stroke="${PATHS[e.path].color}" stroke-width="${sw}" stroke-dasharray="${dash}" opacity="${op}" stroke-linecap="round"/>`;
  });

  // Nodes
  L.forEach(node => {
    const sz=nodeSize(node), s=getSal(node), vis=isVisible(node);
    const isSel=selected===node.id, isH=hovered===node.id;
    const hl=!selected||(selected===node.id);
    const op=vis?(hl||isH?1:0.12):0.03;
    const dc=getDisplayColor(node);
    const sc=isSel?"#fff":dc;
    const sw=isSel?2.5:isH?2:(s>=3?1.5:1);
    const fill=isSel?"#14141e":"#0a0a10";
    const filter=isSel||isH?'filter="url(#gl)"':'';

    html+=`<g class="node-g" data-id="${node.id}" style="cursor:pointer;opacity:${op}" 
      onmouseenter="hoverNode('${node.id}')" onmouseleave="hoverNode(null)" onclick="selectNode('${node.id}')">`;

    if(node.paths.length>=3) html+=`<circle cx="${node.x}" cy="${node.y}" r="${sz+10}" fill="none" stroke="#fff" stroke-width="0.3" opacity="0.15"/>`;

    // Concentric rings
    if(node.paths.length>=2) node.paths.forEach((pid,idx)=>{
      const ra=activePaths.size===0||activePaths.has(pid);
      html+=`<circle cx="${node.x}" cy="${node.y}" r="${sz+2+idx*3}" fill="none" stroke="${PATHS[pid].color}" stroke-width="${ra?1.2:0.4}" opacity="${ra?0.3:0.08}"/>`;
    });

    // Shape
    if(node.type==="talk"){
      html+=`<polygon points="${node.x},${node.y-sz} ${node.x+sz},${node.y} ${node.x},${node.y+sz} ${node.x-sz},${node.y}" fill="${fill}" stroke="${sc}" stroke-width="${sw}" ${filter}/>`;
    } else if(node.type==="media"){
      const s8=sz*0.8;
      html+=`<rect x="${node.x-s8}" y="${node.y-s8}" width="${sz*1.6}" height="${sz*1.6}" rx="2" fill="${fill}" stroke="${sc}" stroke-width="${sw}" ${filter}/>`;
    } else if(node.type==="project"){
      const pts=Array.from({length:6},(_,i)=>{const a=Math.PI/6+(Math.PI/3)*i;return`${node.x+sz*Math.cos(a)},${node.y+sz*Math.sin(a)}`;}).join(" ");
      html+=`<polygon points="${pts}" fill="${fill}" stroke="${sc}" stroke-width="${sw}" ${filter}/>`;
    } else {
      html+=`<circle cx="${node.x}" cy="${node.y}" r="${sz}" fill="${fill}" stroke="${sc}" stroke-width="${sw}" ${filter}/>`;
    }

    // Year label
    if(s>=2) html+=`<text x="${node.x}" y="${node.y+1}" text-anchor="middle" dominant-baseline="middle" fill="${dc}" font-size="${s>=3?9:7}" font-family="'Courier New',monospace" font-weight="bold" style="pointer-events:none">${String(node.year).slice(-2)}</text>`;

    // FR badge
    if(node.lang==="fr") html+=`<text x="${node.x+sz+3}" y="${node.y-sz+3}" font-size="6" fill="#6ab0de" font-family="'Courier New',monospace" font-weight="bold" style="pointer-events:none">FR</text>`;

    // Persistent label for sal 4
    if(s>=4) {
      const t=node.title.length>35?node.title.slice(0,33)+"…":node.title;
      html+=`<text x="${node.x}" y="${node.y+sz+14}" text-anchor="middle" fill="${dc}" font-size="7" opacity="0.5" font-family="'Courier New',monospace" style="pointer-events:none">${t}</text>`;
    }

    html+=`</g>`;
  });

  html += `</g>`;
  svg.innerHTML = html;

  // Update panel
  updatePanel();
  updateLegend();

  // Controls
  renderControls();
}

function renderControls() {
  const c=document.getElementById('controls');
  let h='';
  Object.entries(PATHS).forEach(([k,p])=>{
    const on=activePaths.has(k);
    const op=activePaths.size===0||on?1:0.35;
    h+=`<button class="path-btn" onclick="togglePath('${k}')" style="border:1.5px solid ${p.color};color:${on?'#000':p.color};background:${on?p.color:'transparent'};font-weight:${on?'bold':'normal'};opacity:${op}">${p.symbol} ${p.name}</button>`;
  });
  if(activePaths.size>0) h+=`<button class="path-btn" onclick="clearPaths()" style="border:1px solid #333;color:#555">all</button>`;
  h+=`<span class="sep"></span>`;
  [["all","EN+FR"],["en","EN"],["fr","FR"]].forEach(([v,l])=>{
    const on=langFilter===v;
    h+=`<button class="lang-btn" onclick="setLang('${v}')" style="border:1px solid ${on?'#777':'#333'};color:${on?'#fff':'#555'};background:${on?'#555':'transparent'}">${l}</button>`;
  });
  c.innerHTML=h;
}

function updatePanel() {
  const p=document.getElementById('panel'),pi=document.getElementById('panel-inner'),cb=document.getElementById('close-btn');
  const leg=document.getElementById('legend');
  if(!selected){p.classList.remove('open');cb.style.display='none';leg.style.bottom='10px';return;}
  const n=nodeMap[selected]; if(!n)return;
  p.classList.add('open');cb.style.display='block';leg.style.bottom='42%';
  const edges=buildEdges();
  const connected=new Set();
  edges.forEach(e=>{if(e.from===selected)connected.add(e.to);if(e.to===selected)connected.add(e.from);});
  const dc=getDisplayColor(n);
  let h=`<div class="badges">`;
  n.paths.forEach(pid=>{
    h+=`<span class="badge" style="background:${PATHS[pid].color}18;border:1px solid ${PATHS[pid].color}40;color:${PATHS[pid].color}">${PATHS[pid].symbol} ${PATHS[pid].name}</span>`;
  });
  const hubLabel=n.paths.length>=5?"— CENTRAL HUB":n.paths.length>=3?"— major hub":n.paths.length>=2?"— junction":"";
  h+=`<span style="color:#333;font-size:8px;letter-spacing:1px">${hubLabel}</span>`;
  const langCol=n.lang==="fr"?"#6ab0de":"#7dcea0";
  const langBg=n.lang==="fr"?"#1a2a4a":"#1a3a2a";
  h+=`<span style="background:${langBg};border:1px solid ${langCol}40;color:${langCol};padding:2px 6px;font-size:7px;border-radius:8px;letter-spacing:1px">${n.lang==="fr"?"FR":"EN"}</span>`;
  const es=getSal(n);
  const boosted=langFilter==="fr"&&n.lang==="fr"&&n.sal<4;
  h+=`<span style="color:#444;font-size:7px;letter-spacing:1px;margin-left:4px">${SAL_LABELS[es]}${boosted?" ★":""}</span>`;
  h+=`</div>`;
  h+=`<h2>${n.title}</h2><p class="venue">${n.venue}</p><p class="desc">${n.desc}</p>`;
  if(connected.size>0){
    h+=`<div class="connections"><span class="conn-label">PATHS FROM HERE →</span><div class="conn-btns">`;
    connected.forEach(cId=>{
      const cn=nodeMap[cId];if(!cn)return;
      const ce=edges.find(e=>(e.from===selected&&e.to===cId)||(e.from===cId&&e.to===selected));
      const col=ce?PATHS[ce.path].color:"#555";
      const t=cn.title.length>32?cn.title.slice(0,30)+"…":cn.title;
      h+=`<button class="conn-btn" style="border:1px solid ${col}30;color:${col}" onclick="selectNode('${cId}')">${t}</button>`;
    });
    h+=`</div></div>`;
  }
  if(n.url) h+=`<a class="watch" href="${n.url}" target="_blank" rel="noopener" style="color:${dc}">Watch / Listen →</a>`;
  pi.innerHTML=h;
}

function updateLegend() {
  const leg=document.getElementById('legend');
  let h=`<div class="lbl">SHAPES</div><div class="items">● Paper  ◆ Talk  ■ Media  ⬡ Project</div>`;
  h+=`<div class="lbl divider">ROUTES</div><div class="items">━ spine (must visit)<br>╌ branch (detour)<br>┈ leaf (dead end)</div>`;
  h+=`<div class="lbl divider">SIZE = SALIENCY</div><div class="items" style="color:#444">bigger = more important</div>`;
  if(langFilter==="fr") h+=`<div style="color:#6ab0de;font-size:7px;margin-top:3px">★ FR boost active</div>`;
  h+=`<div style="color:#222;font-size:7px;margin-top:3px">scroll zoom · drag pan</div>`;
  leg.innerHTML=h;
}

// Interactions
function togglePath(p){if(activePaths.has(p))activePaths.delete(p);else activePaths.add(p);render();}
function clearPaths(){activePaths.clear();render();}
function setLang(v){langFilter=v;render();}
function selectNode(id){selected=selected===id?null:id;render();}
function hoverNode(id){hovered=id;}

// Pan & zoom
const svg=document.getElementById('map');
svg.addEventListener('wheel',e=>{e.preventDefault();zoom*=e.deltaY>0?0.92:1.08;zoom=Math.min(3.5,Math.max(0.3,zoom));render();},{passive:false});
svg.addEventListener('mousedown',e=>{if(!e.target.closest('.node-g')){panning=true;lastM={x:e.clientX,y:e.clientY};}});
svg.addEventListener('mousemove',e=>{if(panning){pan.x+=e.clientX-lastM.x;pan.y+=e.clientY-lastM.y;lastM={x:e.clientX,y:e.clientY};render();}});
svg.addEventListener('mouseup',()=>{panning=false;});
svg.addEventListener('mouseleave',()=>{panning=false;});

// Touch support
let lastTouch=null,lastDist=null;
svg.addEventListener('touchstart',e=>{
  if(e.touches.length===1){panning=true;lastM={x:e.touches[0].clientX,y:e.touches[0].clientY};}
  if(e.touches.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:true});
svg.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&panning){pan.x+=e.touches[0].clientX-lastM.x;pan.y+=e.touches[0].clientY-lastM.y;lastM={x:e.touches[0].clientX,y:e.touches[0].clientY};render();}
  if(e.touches.length===2){const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);if(lastDist){zoom*=d/lastDist;zoom=Math.min(3.5,Math.max(0.3,zoom));render();}lastDist=d;}
},{passive:true});
svg.addEventListener('touchend',()=>{panning=false;lastDist=null;});

render();
</script>
</body>
</html>
